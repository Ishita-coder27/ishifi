<!DOCTYPE html>
<html lang="en" data-theme="soft-light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IshiFi — money, made lovely</title>
    <meta name="description" content="A personal finance home that's a joy to open." />
    <meta name="theme-color" content="#ff6b9d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="IshiFi" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23ff6b9d' width='180' height='180' rx='44'/><text x='90' y='90' font-size='110' font-weight='bold' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='system-ui'>🌸</text></svg>" />
    <script>
      // apply saved theme before first paint to avoid flash
      try {
        var t = localStorage.getItem("ishifi-theme");
        if (t) document.documentElement.dataset.theme = t;
      } catch (e) {}

      // register service worker for offline capability
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(() => {
          console.log('[App] Service worker registered');
        }).catch(err => {
          console.log('[App] Service worker registration failed:', err);
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
